name: Build and Publish Image

on:
  push:
    tags:
      - "claude-*"
  workflow_dispatch:
    inputs:
      claude_code_version:
        description: "Claude Code npm version to install (for example 2.1.37 or latest)"
        required: false
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/claude-code
          tags: |
            type=match,pattern=claude-(.+),group=1
            type=raw,value=${{ inputs.claude_code_version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.claude_code_version != '' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'workflow_dispatch' && (inputs.claude_code_version == '' || inputs.claude_code_version == 'latest') }}
          flavor: |
            latest=true
          labels: |
            org.opencontainers.image.title=claude-code
            org.opencontainers.image.description=Claude Code CLI runtime image with core development tools

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLAUDE_CODE_VERSION=${{ steps.meta.outputs.version }}

      - name: Verify published manifest contains amd64 and arm64
        run: |
          set -euo pipefail
          primary_tag="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)"
          docker buildx imagetools inspect "$primary_tag" > /tmp/imagetools.txt
          grep -q "linux/amd64" /tmp/imagetools.txt
          grep -q "linux/arm64" /tmp/imagetools.txt
